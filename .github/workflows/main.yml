name: CI/CD Pipeline

on:
  push:
    branches: ["main"]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Cleanup before test
        run: docker compose down -v || true

      - name: Validate Docker Compose
        run: docker compose config

      - name: Test Infrastructure
        run: |
          set -e
          docker compose up -d
          docker compose ps
          docker compose logs

      - name: Cleanup after test
        if: always()
        run: docker compose down -v

  build-and-push:
    needs: test
    runs-on: ubuntu-latest

    permissions:
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      
      - name: Build & Push Backend
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/week3:latest
            ghcr.io/${{ github.repository_owner }}/week3:${{ github.sha }}

     
      - name: Build & Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/week3/templates:latest
            ghcr.io/${{ github.repository_owner }}/week3/templates:${{ github.sha }}
