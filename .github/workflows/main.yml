name: Self-Hosted CI/CD

on:
  push:
    branches: [ "main" ] 

# This silences the Node.js 20 warnings
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-push:
    runs-on: self-hosted
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # FIX 1: This initializes the build engine on your local machine
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # FIX 2: Updated to v6 for Node 24 support
      - name: Build and push Backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend 
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/week3:latest

      - name: Build and push Frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend 
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/week3/templates:latest
