name: Self-Hosted CI/CD
 
on:

  push:

    branches: [ "main" ]
 
jobs:

  build-and-push:

    runs-on: self-hosted

    permissions:

      contents: read

      packages: write
 
    steps:

      - name: Checkout code

        uses: actions/checkout@v4
 
      - name: Log in to GitHub Container Registry

        uses: docker/login-action@v3

        with:

          registry: ghcr.io

          username: ${{ github.actor }}

          password: ${{ secrets.BADER2 }}
 
      - name: Build and push Backend

        uses: docker/build-push-action@v5

        with:

          context: ./

          push: true

          tags: ghcr.io/bader3823/week3:latest
 
      - name: Build and push Frontend

        uses: docker/build-push-action@v5

        with:

          context: ./

          push: true

          tags: ghcr.io/bader3823/week3/templates:latest
 
  deploy:
    needs: build-and-push
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Log in to GitHub Container Registry
        run: echo "${{ secrets.BADER2 }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
      
      - name: Pull latest images
        run: |
           docker pull ghcr.io/bader3823/week3:latest && docker pull ghcr.io/bader3823/week3/templates:latest
           docker pull ghcr.io/bader3823/week3:latest && docker pull ghcr.io/bader3823/week3:latest

      - name: Run new containers
        run: |
           cd /home/cybersecurity/Desktop/week3
           docker-compose up -d
